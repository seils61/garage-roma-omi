name: Leggi notifiche email annunci garage

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  leggi-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Esegui script lettura email
        env:
          OUTLOOK_EMAIL: ${{ secrets.OUTLOOK_EMAIL }}
          OUTLOOK_APP_PASSWORD: ${{ secrets.OUTLOOK_APP_PASSWORD }}
        run: python 02_leggi_email_annunci.py

      - name: Commit e push risultati
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add annunci_garage.json
          git diff --staged --quiet || git commit -m "Aggiornamento automatico annunci garage"
          git push
